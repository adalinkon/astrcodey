name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: astrcode-x86_64-linux
            ext: ""
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: astrcode-aarch64-linux
            ext: ""
          - target: x86_64-apple-darwin
            runner: macos-latest
            artifact: astrcode-x86_64-macos
            ext: ""
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: astrcode-aarch64-macos
            ext: ""
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            artifact: astrcode-x86_64-windows
            ext: ".exe"
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            artifact: astrcode-aarch64-windows
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install cross-compilation dependencies
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz astrcode
      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path astrcode.exe -DestinationPath ../../../${{ matrix.artifact }}.zip
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
          if-no-files-found: warn

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false
      - name: Gather release files
        run: |
          mkdir release-assets
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release-assets/ \;
      - name: Generate changelog
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME}
          PREVIOUS=$(git tag --sort=-creatordate | head -2 | tail -1)
          if [ -n "$PREVIOUS" ]; then
            LOG=$(git log "${PREVIOUS}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          {
            echo "version=$VERSION"
            echo "## What's Changed"
            echo ""
            echo "$LOG"
          } > release-notes.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.changelog.outputs.version }}
          body_path: release-notes.md
          files: release-assets/*
          generate_release_notes: false
