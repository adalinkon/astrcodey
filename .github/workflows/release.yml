name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── 版本号计算与 bump ─────────────────────────────────────────────

  prepare:
    name: Prepare version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            # Tag push: 直接用 tag
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          else
            # workflow_dispatch: 从 workspace Cargo.toml 读取当前版本并 bump
            CURRENT=$(grep -A5 '^\[workspace\.package\]' Cargo.toml | grep -m1 '^version = ' | sed 's/.*"\(.*\)"/\1/')
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            case "${{ inputs.bump }}" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
            TAG="v${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION} (tag: ${TAG})"

      - name: Bump crate versions and tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          OLD=$(grep -A5 '^\[workspace\.package\]' Cargo.toml | grep -m1 '^version = ' | sed 's/.*"\(.*\)"/\1/')

          # workspace 版本（各 crate 通过 version.workspace = true 继承）
          sed -i "0,/^version = \"${OLD}\"/{s/^version = \"${OLD}\"/version = \"${VERSION}\"/}" Cargo.toml

          # Keep frontend package metadata and its lockfile in sync.
          npm version "${VERSION}" --no-git-tag-version --prefix frontend

          cargo check --workspace

          # 提交并打 tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bump version to ${VERSION}" || echo "No changes to commit"
          git tag -a "${TAG}" -m "${TAG}"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "${TAG}"

  # ── Server binary builds ──────────────────────────────────────────

  build-server:
    name: Server (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: [prepare]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: astrcode-http-server-x86_64-linux
            binary: astrcode-http-server
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: astrcode-http-server-aarch64-linux
            binary: astrcode-http-server
            archive: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-latest
            artifact: astrcode-http-server-x86_64-macos
            binary: astrcode-http-server
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: astrcode-http-server-aarch64-macos
            binary: astrcode-http-server
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            artifact: astrcode-http-server-x86_64-windows
            binary: astrcode-http-server.exe
            archive: zip
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            artifact: astrcode-http-server-aarch64-windows
            binary: astrcode-http-server.exe
            archive: zip
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install cross-compilation dependencies
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }} --bin astrcode-http-server
      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: tar czf ${{ matrix.artifact }}.tar.gz -C target/${{ matrix.target }}/release ${{ matrix.binary }}
      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path target/${{ matrix.target }}/release/${{ matrix.binary }} -DestinationPath ${{ matrix.artifact }}.zip
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.archive }}

  # ── GitHub Release ────────────────────────────────────────────────

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [prepare, build-server]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Gather release files
        run: |
          mkdir release-assets
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release-assets/ \;
          ls -la release-assets/
      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          PREVIOUS=$(git tag --sort=-creatordate | grep -v "^${TAG}$" | grep '^v' | head -1)
          {
            echo "## ${TAG}"
            echo ""
            echo "Released: $(date -u +%Y-%m-%d)"
            echo ""

            if [ -n "$PREVIOUS" ]; then
              RANGE="${PREVIOUS}..HEAD"
            else
              RANGE="HEAD"
            fi

            FEATURES=$(git log "$RANGE" --pretty=format:"%s (%h)" --no-merges 2>/dev/null | grep -iE '^feat' || true)
            if [ -n "$FEATURES" ]; then
              echo "### ✨ Features"
              echo ""
              echo "$FEATURES" | sed 's/^/- /'
              echo ""
            fi

            FIXES=$(git log "$RANGE" --pretty=format:"%s (%h)" --no-merges 2>/dev/null | grep -iE '^fix' || true)
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bug Fixes"
              echo ""
              echo "$FIXES" | sed 's/^/- /'
              echo ""
            fi

            REFACTORS=$(git log "$RANGE" --pretty=format:"%s (%h)" --no-merges 2>/dev/null | grep -iE '^refactor' || true)
            if [ -n "$REFACTORS" ]; then
              echo "### 🔧 Refactors"
              echo ""
              echo "$REFACTORS" | sed 's/^/- /'
              echo ""
            fi

            echo "---"
            echo ""
            echo "**Artifacts:** prebuilt \`astrcode-http-server\` binaries"
          } > release-notes.md
          cat release-notes.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          body_path: release-notes.md
          draft: false
          files: release-assets/*
      - name: Ensure release body is correct
        run: gh release edit "${{ needs.prepare.outputs.tag }}" --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
